<div class="pending-page">
  <div class="wave-top-left"></div>
  <div class="wave-bottom-right"></div>

  <div class="pending-card">
    <div class="pending-logo">
      <img src="/landing page logo.png" alt="EdTech Logo" class="pending-logo-img">
    </div>

    <div class="pending-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#F59E0B" stroke-width="1.5"/>
        <path d="M12 7V12L15 15" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <h2 class="pending-title">Application Under Review</h2>
    <p class="pending-subtitle">
      Thank you for registering as a mentor! Your application and documents have been submitted
      and are currently being reviewed by our admin team.
    </p>
    <p class="pending-note">
      You'll be notified once your account has been approved. This usually takes 1–2 business days.
    </p>

    <button class="pending-logout-btn" (click)="onLogout()">Back to Login</button>
  </div>
</div>
