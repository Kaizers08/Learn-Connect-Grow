<div class="register-page">
  <div class="wave-top-left"></div>
  <div class="wave-bottom-right"></div>

  <div class="register-card">

    <!-- Logo -->
    <div class="register-logo">
      <img src="/landing page logo.png" alt="EdTech Logo" class="register-logo-img">
    </div>

    <!-- Title -->
    <h2 class="register-title">
      Sign Up to <span class="text-blue">Ed</span><span class="text-green">Tech</span>
    </h2>

    <!-- Form -->
    <form class="register-form" (ngSubmit)="onSignUp()">

      <!-- First Name & Middle Name -->
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            type="text"
            placeholder="First Name"
            [(ngModel)]="firstName"
            name="firstName"
            class="form-input"
            required
          >
        </div>
        <div class="form-group">
          <label for="middleName">Middle Name (Optional)</label>
          <input
            id="middleName"
            type="text"
            placeholder="Middle Name"
            [(ngModel)]="middleName"
            name="middleName"
            class="form-input"
          >
        </div>
      </div>

      <!-- Last Name -->
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input
          id="lastName"
          type="text"
          placeholder="Last Name"
          [(ngModel)]="lastName"
          name="lastName"
          class="form-input"
          required
        >
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          placeholder="Email Address"
          [(ngModel)]="email"
          name="email"
          class="form-input"
          required
        >
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Password"
            [(ngModel)]="password"
            name="password"
            class="form-input"
            required
          >
          <button type="button" class="toggle-password" (click)="togglePassword()">
            @if (showPassword) {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Terms & Conditions -->
      <div class="form-group checkbox-group">
        <label class="checkbox-label">
          <input
            type="checkbox"
            name="agree"
            class="checkbox-input"
            required
          >
          <span class="checkbox-text">
            I agree to the <a href="#" class="text-cyan">Terms of Service</a> and <a href="#" class="text-cyan">Privacy Policy</a>
          </span>
        </label>
      </div>

      <button type="submit" class="btn-signup">Sign Up</button>

    </form>

    <!-- Sign In -->
    <p class="signin-text">
      Already have an account? <a (click)="goToLogin()" class="text-green link">Sign In</a>
    </p>

    <!-- Divider -->
    <div class="divider">
      <span>Or sign up with</span>
    </div>

    <!-- Google -->
    <button class="btn-google" (click)="signUpWithGoogle()" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign up with Google
    </button>

    <!-- Footer -->
    <div class="register-footer">
      <a href="#">Privacy Policy</a>
      <span>|</span>
      <a href="#">Terms of Service</a>
    </div>

  </div>
</div>
