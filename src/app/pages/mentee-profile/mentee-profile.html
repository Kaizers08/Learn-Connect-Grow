<div class="mentee-page">
  <div class="wave-top-left"></div>
  <div class="wave-bottom-right"></div>

  <div class="mentee-container">

    <!-- Logo -->
    <div class="mentee-logo">
      <img src="/landing page logo.png" alt="EdTech Logo" class="mentee-logo-img">
    </div>

    <!-- Title -->
    <h2 class="mentee-title">Complete your profile</h2>
    <p class="mentee-subtitle">Tells us about yourself to get started</p>

    <!-- Card -->
    <div class="mentee-card">

      <!-- I am a -->
      <div class="form-section">
        <label class="section-label">I am a ...</label>
        <select class="form-input" [(ngModel)]="selectedType" name="type">
          @for (type of types; track type.value) {
            <option [value]="type.value">{{ type.label }}</option>
          }
        </select>
      </div>

      <!-- Student: University -->
      @if (isStudent) {
        <div class="form-section">
          <label class="field-label">Which university are you from?</label>
          <input
            type="text"
            class="form-input"
            placeholder="e.g. Bulacan State University Malolos"
            [(ngModel)]="university"
            name="university"
          >
        </div>
      }

      <!-- Working Professional / Entrepreneur: Job Position + Company -->
      @if (isWorkingOrEntrepreneur) {
        <div class="form-section">
          <label class="field-label">Job Position</label>
          <input
            type="text"
            class="form-input"
            placeholder="e.g. Software Engineer"
            [(ngModel)]="jobPosition"
            name="jobPosition"
          >
        </div>
        <div class="form-section">
          <label class="field-label">Company</label>
          <input
            type="text"
            class="form-input"
            placeholder="e.g. Google"
            [(ngModel)]="company"
            name="company"
          >
        </div>
      }

      <!-- Desired Expertise (for matchmaking) -->
      <div class="form-section">
        <label class="field-label">What expertise do you want to learn?</label>
        <select class="form-input" [(ngModel)]="desiredExpertise" name="desiredExpertise">
          <option value="" disabled selected>Select an expertise</option>
          @for (exp of expertiseOptions; track exp) {
            <option [value]="exp">{{ exp }}</option>
          }
        </select>
      </div>

      <!-- Desired Skills (for matchmaking) -->
      <div class="form-section">
        <label class="field-label">What technical skills do you want to learn?</label>
        <div class="skill-tags">
          @for (skill of desiredSkills; track skill) {
            <span class="skill-tag">
              {{ skill }}
              <button type="button" class="skill-tag-remove" (click)="toggleSkill(skill)">✕</button>
            </span>
          }
        </div>
        <div class="skill-add-row">
          <input
            type="text"
            class="form-input"
            placeholder="Type a skill and press Enter"
            [(ngModel)]="skillInput"
            name="skillInput"
            (keydown.enter)="$event.preventDefault(); addSkill()"
          >
          <button type="button" class="btn-add-skill" (click)="addSkill()">Add</button>
        </div>
        <div class="skill-suggestions">
          @for (skill of skillOptions; track skill) {
            @if (!desiredSkills.includes(skill)) {
              <button type="button" class="skill-suggestion" (click)="toggleSkill(skill)">+ {{ skill }}</button>
            }
          }
        </div>
      </div>

    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-previous" (click)="onPrevious()">Previous</button>
      <button class="btn-next" (click)="onNext()">Next</button>
    </div>

  </div>
</div>
